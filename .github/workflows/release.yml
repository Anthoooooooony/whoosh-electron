name: release

on:
  push:
    tags:
      - 'v*.*.*'
  # release-please 用 GITHUB_TOKEN 推 tag，被 Actions 递归锁屏蔽 push 事件；
  # workflow_dispatch 是显式豁免事件，可由 release-please.yml 主动唤起。
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: darwin
            arch: arm64
          - runner: windows-latest
            os: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Configure pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native paste addon (electron-rebuild)
        env:
          NO_PROXY: '*'
        run: pnpm build:native

      - name: Bundle main + renderers (electron-vite)
        run: pnpm build

      - name: Package (electron-builder)
        run: pnpm exec electron-builder --${{ matrix.os == 'darwin' && 'mac' || 'win' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest-mac.yml
            release/latest.yml
          fail_on_unmatched_files: false
