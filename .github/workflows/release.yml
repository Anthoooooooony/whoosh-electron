name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: darwin
            arch: arm64
          - runner: windows-latest
            os: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native paste addon (electron-rebuild)
        env:
          NO_PROXY: '*'
        run: pnpm build:native

      - name: Bundle main + renderers (electron-vite)
        run: pnpm build

      - name: Package (electron-builder)
        run: pnpm exec electron-builder --${{ matrix.os == 'darwin' && 'mac' || 'win' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest-mac.yml
            release/latest.yml
          fail_on_unmatched_files: false
