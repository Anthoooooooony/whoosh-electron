name: CI

on:
  push:
    branches: [main]
  pull_request:
  # release-please 用 GITHUB_TOKEN 推 PR 分支，pull_request 事件被递归锁屏蔽。
  # workflow_dispatch 是显式豁免事件，release-please.yml 主动 dispatch 后即可。
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      # 平台间互相独立暴露平台特定问题（hotkey rawcode、process.platform 分支、
      # 剪贴板 ConcealedType 标记等），一边失败不应掩盖另一边的诊断信号。
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Configure pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check

      - name: Vitest
        run: pnpm test
